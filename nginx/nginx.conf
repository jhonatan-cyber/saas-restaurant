# nginx/nginx.conf — Reverse proxy para saas-restaurant
# Uso: docker run -p 80:80 -v ./nginx.conf:/etc/nginx/nginx.conf nginx:alpine

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Limitar tamaño de body para uploads de reportes
  client_max_body_size 20M;

  # Timeouts
  proxy_connect_timeout 30s;
  proxy_read_timeout 60s;
  proxy_send_timeout 60s;

  # Buffers
  proxy_buffering off;
  proxy_request_buffering off;

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;
  gzip_min_length 256;

  # Upstreams
  upstream api {
    server api:3001;
  }

  upstream web {
    server web:3000;
  }

  upstream print_agent {
    server print-agent:3002;
  }

  server {
    listen 80;
    server_name _;

    # Logging
    access_log /dev/stdout;
    error_log /dev/stderr;

    # ========== Web Frontend (TanStack Start SSR) ==========
    location / {
      root /usr/share/nginx/landing;
      try_files $uri $uri/ /index.html;
    }

    # ========== API ==========
    location /api/ {
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== Uploads (reportes generados) ==========
    location /uploads/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # Cache de archivos estáticos
      add_header Cache-Control "public, max-age=3600";
    }

    # ========== WebSocket (socket.io para KDS/Orders) ==========
    location /socket.io/ {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Timeouts largos para WebSocket
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # ========== Print Agent ==========
    location /print/ {
      proxy_pass http://print_agent;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
