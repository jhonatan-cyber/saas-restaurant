# docker-compose.prod.yml — Production deployment
# Usage: docker compose -f docker-compose.prod.yml up -d
# Ensure .env file contains all required environment variables

services:
  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-saas_restaurant}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=200
      - --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - saas_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - saas_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: saas_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      API_PORT: 3001
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3001"
    volumes:
      - uploads_data:/app/apps/api/uploads
    networks:
      - saas_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: saas_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001/api}
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:3001}
    expose:
      - "3000"
    networks:
      - saas_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  print-agent:
    build:
      context: .
      dockerfile: apps/print-agent/Dockerfile
    container_name: saas_print_agent
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://api:3001}
      PRINTER_NAME: ${PRINTER_NAME:-POS-80}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3002"
    networks:
      - saas_net
    # For USB printer access on Linux:
    # devices:
    #   - "/dev/usb/lp0:/dev/usb/lp0"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
      - print-agent
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Add SSL certificates when available:
      # - ./certs/cert.pem:/etc/nginx/certs/cert.pem:ro
      # - ./certs/key.pem:/etc/nginx/certs/key.pem:ro
    networks:
      - saas_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  saas_net:
    driver: bridge
