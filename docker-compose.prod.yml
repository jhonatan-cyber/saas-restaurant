# docker-compose.prod.yml — Producción
# Uso: docker compose -f docker-compose.prod.yml up -d
# Asegurate de tener un .env con las variables necesarias

services:
  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-saas_restaurant}
      MYSQL_ROOT_HOST: "%"
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - saas_net

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - saas_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: saas_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-mysql://root:rootpass@mysql:3306/saas_restaurant}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      API_PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads_data:/app/apps/api/uploads
    networks:
      - saas_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: saas_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - saas_net

  print-agent:
    build:
      context: .
      dockerfile: apps/print-agent/Dockerfile
    container_name: saas_print_agent
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_URL: ${API_URL:-http://api:3001}
      PRINTER_NAME: ${PRINTER_NAME:-POS-80}
    ports:
      - "127.0.0.1:3002:3002"
    # Para acceso a impresoras USB en Linux:
    # devices:
    #   - "/dev/usb/lp0:/dev/usb/lp0"
    networks:
      - saas_net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  saas_net:
    driver: bridge
