name: CI & Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: cd api && bunx prisma generate

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Build
        run: npx turbo run build --filter=!@saas/mobile

      - name: Test
        run: bun run test --filter=!@saas/mobile

      - name: Check formatting
        run: bun run format:check
        continue-on-error: true
