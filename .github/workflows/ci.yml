name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Check no "latest" in package.json files
        run: |
          FOUND=$(grep -rn '"latest"' -- '**/package.json' || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Found 'latest' version specifiers:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No 'latest' anti-pattern found"

      - name: Type-check all workspaces
        run: npx turbo run typecheck --continue

      - name: Lint all workspaces
        run: npx turbo run lint --continue

      - name: Build all workspaces
        run: npx turbo run build

      - name: Run tests
        run: npx turbo run test --continue

      - name: Check formatting
        run: bun run format:check
        continue-on-error: true

      # desktop check removed — no longer part of the monorepo
