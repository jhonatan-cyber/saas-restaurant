name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Check no "latest" in package.json files
        run: |
          FOUND=$(grep -rn '"latest"' -- '**/package.json' || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Found 'latest' version specifiers:"
            echo "$FOUND"
            exit 1
          fi
          echo "✅ No 'latest' anti-pattern found"

      - name: Type-check all workspaces
        run: bun run --filter='*' typecheck
