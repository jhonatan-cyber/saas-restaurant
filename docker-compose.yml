services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: saas_restaurant_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:rootpass@mysql:3306/saas_restaurant
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-key-change-in-production
      LOG_LEVEL: debug
      DISABLE_WS: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
    networks:
      - saas_net

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: saas_restaurant_admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001/api
      VITE_API_BASE_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3001/api
      API_INTERNAL_BASE_URL: http://api:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/admin/src:/app/apps/admin/src
    healthcheck:
      test: ["CMD", "bun", "-e", "try{const r=await fetch('http://127.0.0.1:3000/');process.exit(r.status<500?0:1)}catch{process.exit(1)}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - saas_net

  print-agent:
    build:
      context: .
      dockerfile: apps/print-agent/Dockerfile
    container_name: saas_restaurant_print_agent
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: development
      API_URL: http://api:3001
      PRINTER_NAME: POS-80
      PRINT_AGENT_PORT: "3002"
    ports:
      - "3002:3002"
    volumes:
      - ./apps/print-agent/src:/app/apps/print-agent/src
    networks:
      - saas_net

  mysql:
    image: mysql:8.0
    container_name: saas_restaurant_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: saas_restaurant
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - saas_net

  redis:
    image: redis:7-alpine
    container_name: saas_restaurant_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - saas_net

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_restaurant_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      admin:
        condition: service_healthy
      print-agent:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./apps/landing/dist:/usr/share/nginx/landing:ro
    networks:
      - saas_net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  saas_net:
    driver: bridge
