services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    container_name: saas_restaurant_api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "cd /app && bun install && cd apps/api && bunx prisma generate --config prisma.config.js && bunx prisma migrate deploy --config prisma.config.js && bun --watch src/main.ts"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://root:rootpass@mysql:3306/saas_restaurant
      REDIS_URL: redis://redis:6379
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8888
      JWT_SECRET: dev-jwt-secret-key-change-in-production
      JWT_REFRESH_SECRET: dev-jwt-refresh-secret-key-change-in-production
      LOG_LEVEL: debug
      DISABLE_WS: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - api_node_modules:/app/node_modules
      - ./package.json:/app/package.json
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
    healthcheck:
      test: ["CMD", "bun", "-e", "try{const r=await fetch('http://localhost:3001/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});process.exit(r.status<500?0:1)}catch{process.exit(1)}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - saas_net

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: dev
    container_name: saas_restaurant_admin
    restart: unless-stopped
    depends_on:
      - api
    command: sh -c "cd /app && bun install && cd apps/admin && bun run dev"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001/api
      VITE_API_BASE_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3001/api
      API_INTERNAL_BASE_URL: http://api:3001
      CHOKIDAR_USEPOLLING: "true"
      WEB_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - admin_node_modules:/app/node_modules
      - ./package.json:/app/package.json
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./apps/admin:/app/apps/admin
      - ./packages/shared:/app/packages/shared
      - ./packages/ui:/app/packages/ui
    healthcheck:
      test: ["CMD", "bun", "-e", "try{const r=await fetch('http://127.0.0.1:3000/');process.exit(r.status<500?0:1)}catch{process.exit(1)}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - saas_net

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      target: dev
    container_name: saas_restaurant_landing
    restart: unless-stopped
    command: sh -c "cd /app && bun install && cd apps/landing && bun run dev"
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4321:4321"
    volumes:
      - landing_node_modules:/app/node_modules
      - ./package.json:/app/package.json
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./apps/landing:/app/apps/landing
      - ./packages/shared:/app/packages/shared
      - ./packages/ui:/app/packages/ui
    networks:
      - saas_net
    healthcheck:
      test: ["CMD", "bun", "-e", "try{const r=await fetch('http://127.0.0.1:4321/');process.exit(r.status<500?0:1)}catch{process.exit(1)}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  print-agent:
    build:
      context: .
      dockerfile: apps/print-agent/Dockerfile
      target: dev
    container_name: saas_restaurant_print_agent
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: sh -c "cd /app && bun install && cd apps/print-agent && bun run --hot src/index.ts"
    environment:
      NODE_ENV: development
      API_URL: http://api:3001
      PRINTER_NAME: POS-80
      PRINT_AGENT_PORT: "3002"
      PRINTERS_JSON: /app/apps/print-agent/printers.json
    ports:
      - "3002:3002"
    volumes:
      - print_agent_node_modules:/app/node_modules
      - ./package.json:/app/package.json
      - ./tsconfig.base.json:/app/tsconfig.base.json
      - ./apps/print-agent:/app/apps/print-agent
    healthcheck:
      test: ["CMD", "bun", "-e", "try{const r=await fetch('http://localhost:3002/health');process.exit(r.ok?0:1)}catch{process.exit(1)}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - saas_net

  mysql:
    image: mysql:8.0
    container_name: saas_restaurant_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: saas_restaurant
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - saas_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: saas_restaurant_phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpass
      UPLOAD_LIMIT: 100M
    ports:
      - "8081:80"
    networks:
      - saas_net

  redis:
    image: redis:7-alpine
    container_name: saas_restaurant_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - saas_net

  nginx:
    image: nginx:1.27-alpine
    container_name: saas_restaurant_nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
      landing:
        condition: service_healthy
      print-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - saas_net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  api_node_modules:
    driver: local
  admin_node_modules:
    driver: local
  landing_node_modules:
    driver: local
  print_agent_node_modules:
    driver: local

networks:
  saas_net:
    driver: bridge
